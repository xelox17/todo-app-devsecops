name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: anas1755521
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: anas1755521/todo-backend:latest
    
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: anas1755521/todo-frontend:latest

  test:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install flask requests pytest
    
    - name: Run tests
      run: |
        echo "Running basic tests..."
        python -c "import flask; print('Flask OK')"
        echo "Tests passed!"

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, test]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy notification
      run: |
        echo "✅ Images pushed to Docker Hub"
        echo "📦 Backend: anas1755521/todo-backend:latest"
        echo "📦 Frontend: anas1755521/todo-frontend:latest"
        echo "🚀 Ready to deploy on k3s cluster"
