name: CI/CD Pipeline Sécurisé

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pip-audit
        pip install -r backend/requirements.txt
        pip install -r frontend/requirements.txt

    - name: Dependency Scan (pip-audit)
      run: |
        echo "🔍 Scanning Python dependencies..."
        pip-audit -r backend/requirements.txt || true
        pip-audit -r frontend/requirements.txt || true

    - name: Secret Detection (gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

  build-and-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Image
      run: docker build -t todo-backend:test ./backend

    - name: Build Frontend Image
      run: docker build -t todo-frontend:test ./frontend

    - name: Install Trivy
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Trivy Scan Backend
      run: |
        echo "🔍 Scanning Backend image for vulnerabilities..."
        trivy image --severity HIGH,CRITICAL --exit-code 0 todo-backend:test

    - name: Trivy Scan Frontend
      run: |
        echo "🔍 Scanning Frontend image for vulnerabilities..."
        trivy image --severity HIGH,CRITICAL --exit-code 0 todo-frontend:test

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: anas1755521
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Backend
      run: |
        docker tag todo-backend:test anas1755521/todo-backend:latest
        docker push anas1755521/todo-backend:latest

    - name: Push Frontend
      run: |
        docker tag todo-frontend:test anas1755521/todo-frontend:latest
        docker push anas1755521/todo-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy notification
      run: |
        echo "✅ Security scans passed"
        echo "✅ Images pushed to Docker Hub"
        echo "🚀 Ready to deploy on k3s cluster"
